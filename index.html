<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather App</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.container{
    width:400px;
    background:white;
    padding:25px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

h1{
    margin-bottom:20px;
    color:#333;
}

.search-box{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:#007bff;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.weather-card{
    margin-top:20px;
    display:none;
}

.weather-card img{
    width:80px;
}

.weather-info{
    text-align:left;
    margin-top:15px;
}

.weather-info p{
    margin:8px 0;
    font-size:18px;
}

#dateTime{ 
    margin:10px 0;
    font-size:16px;
    font-weight:bold;
    color:#555;
}

.dark-mode{
    background: #121212;
    color: white;
}

#searchHistory{
    list-style:none;
    padding: 0;
}

#searchHistory li{
    cursor:pointer;
    margin:5px 0;
}

#searchHistory li:hover{
    text-decoration:underline;
}

.dark-mode .container{
    background: #1e1e1e;
    color:white;
}

.dark-mode input{
    background: #333;
    color:white;
    border: 1px solid #555;
}

.dark-mode #dateTime{
    color: #ddd;
}

#forecastContainer{
    display:flex;
    justify-content: space-between;
    gap: 10px;
    margin-top: 15px;
}

.forecast-day{
    flex:1;
    padding: 10px;
    border-radius: 10px;
    background: #f0f0f0;
    text-align: center;
}

.dark-mode .forecast-day{
    background: #333;
}

</style>

</head>
<body>

<div class="container">

    <h1>🌤 Weather App</h1>

    <button id="darkModeBtn" onclick="toggleDarkMode()">
     🌙Dark Mode
    </button>

    <p id="dateTime"></p>

    <div class="search-box">
        <input
            type="text"
            id="locationInput"
            placeholder="Enter city name"
            onkeypress="if(event.key==='Enter') getWeather()"
        >
        <button onclick="getWeather()">Search</button>

    </div>

    <h3>Recent Searches</h3>

    <button onclick="clearHistory()">
        🗑️ Clear History
    </button>
    <ul id="searchHistory"></ul>

    <div class="weather-card" id="weatherCard">

        <h2 id="city"></h2>

        <img id="weatherIcon" src="" alt="">

        <h3 id="condition"></h3>

        <div class="weather-info">
            <p>🌡 Temperature: <span id="temp"></span> °C</p>
            <p>🥵 Feels Like: <span id="feelsLike"></span> °C</p>
            <p>💨 Wind Speed: <span id="wind"></span> km/h</p>
            <p>💧 Humidity: <span id="humidity"></span>%</p>
            <p>🌡 Pressure: <span id="pressure"></span> mb</p>
            <p>🌫 Air Quality (PM2.5): <span id="aqi"></span></p>
            <p>🌄Sunrise: <span id="sunrise"></span></p>
            <p>🌇Sunset: <span id="sunset"></span></p>
        </div>

    </div>
    <h3>3-Day Forecast</h3>
    <div id="forecastContainer"></div>

</div>

<script>

function toggleDarkMode() {
    document.body.classList.toggle("dark-mode");
    const btn = document.getElementById("darkModeBtn");

    if(document.body.classList.contains("dark-mode")) {
        btn.innerText = "☀️ Light Mode";
    }
    else{
        btn.innerText = "🌙 Dark Mode";
    }

}

function updateDateTime(){
    const now = new Date();

    const date = now.toLocaleDateString("en-IN",
{
    day:"numeric",
    month:"long",
    year:"numeric"
    });

    const time =
now.toLocaleTimeString("en-IN");

document.getElementById("dateTime").innerHTML = `📅 ${date}<br>⏲️ ${time}`;
}

let recentSearches = [];

function updateSearchHistory() {

    let historyList = document.getElementById("searchHistory");
    historyList.innerHTML = "";
    recentSearches.forEach(city => {
        let li = document.createElement("li");
        li.innerText = city;
        li.style.cursor = "pointer";
        li.onclick = function() {
            document.getElementById("locationInput").value = city;
            getWeather();
        };
        historyList.appendChild(li);
    });
}

function clearHistory() {
    recentSearches = [];
    updateSearchHistory();
}

async function getWeather() {

    const location =
        document.getElementById("locationInput").value.trim();

    if(location && !recentSearches.includes(location)) {
        recentSearches.unshift(location);

        if(recentSearches.length > 5) {
            recentSearches.pop();
        }

        updateSearchHistory();
    }

    if(location === ""){
        alert("Please enter a city name");
        return;
    }

    const apiKey = "YOUR_API_KEY_HERE";

    const url =
    `https://api.weatherapi.com/v1/forecast.json?key=${apiKey}&q=${location}&days=3&aqi=yes`;

    try {

        const response = await fetch(url);

        if(!response.ok){
            throw new Error("Location not found");
        }

        const data = await response.json();

        document.getElementById("weatherCard").style.display = "block";

        document.getElementById("city").innerText =
            `${data.location.name}, ${data.location.country}`;

        document.getElementById("temp").innerText =
            data.current.temp_c;

        document.getElementById("wind").innerText =
            data.current.wind_kph;

        document.getElementById("humidity").innerText =
            data.current.humidity;

        document.getElementById("feelsLike").innerText =
            data.current.feelslike_c;

        document.getElementById("pressure").innerText =
            data.current.pressure_mb;  

        document.getElementById("aqi").innerText =
            Number(data.current.air_quality.pm2_5).toFixed(2);

        document.getElementById("sunrise").innerText =
            data.forecast.forecastday[0].astro.sunrise;

        document.getElementById("sunset").innerText =
            data.forecast.forecastday[0].astro.sunset;

        let forecastHTML = "";

        data.forecast.forecastday.forEach(day => {

            forecastHTML += `
                <div class ="forecast-day">
                    <h4>${day.date}</h4>
                    <img src ="https:${day.day.condition.icon}">
                    <p>${day.day.avgtemp_c} °C</p>
                    <P>${day.day.condition.text}</p>
                </div> 
            `;   
        });

        document.getElementById("forecastContainer").innerHTML = 
            forecastHTML;

        const condition = data.current.condition.text;

        if(condition.includes("Sunny")) {
            document.body.style.background = 
            "linear-gradient(135deg, #f6d365, #fda085)";
        }
        else if(condition.includes("Cloud")) {
            document.body.style.background = 
            "linear-gradient(135deg, #bdc3c7, #2c3e50)";
        }
        else if(condition.includes("Rain")) {
            document.body.style.background = 
            "linear-gradient(135deg, #4facfe, #00f2fe)";
        }
        else if(condition.includes("Thunder")) {
            document.body.style.background = 
            "linear-gradient(135deg, #232526, #414345)";
        }
        else if(condition.includes("Mist")) {
            document.body.style.background = 
            "linear-gradient(135deg, #d3cce3, #e9e4f0)";
        }
        else if(condition.includes("Snow")) {
            document.body.style.background = 
            "linear-gradient(135deg, #e6dada, #274046)";
        }
        

        let emoji = "🌥️";
        if(condition.includes("Sunny")){
            emoji = "☀️"
        }
        else if (condition.includes("Cloud")){
            emoji = "☁️"
        }
         else if (condition.includes("Rain")){
            emoji = "🌧️"
        }
         else if (condition.includes("Thunder")){
            emoji = "⛈️"
        }
         else if (condition.includes("Mist")){
            emoji = "🌫️"
        }
         else if (condition.includes("Snow")){
            emoji = "❄️"
        }

        document.getElementById("condition").innerText =
            emoji + " " + condition;

        document.getElementById("weatherIcon").src =
            "https:" + data.current.condition.icon;

    } catch(error) {

        alert("Location not found!");

        document.getElementById("weatherCard").style.display = "none";

        console.error(error);
    }
}

updateDateTime();
setInterval(updateDateTime, 1000);

</script>

</body>
</html>
