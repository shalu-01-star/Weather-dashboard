<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather App</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.container{
    width:400px;
    background:white;
    padding:25px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

h1{
    margin-bottom:20px;
    color:#333;
}

.search-box{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:#007bff;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.weather-card{
    margin-top:20px;
    display:none;
}

.weather-card img{
    width:80px;
}

.weather-info{
    text-align:left;
    margin-top:15px;
}

.weather-info p{
    margin:8px 0;
    font-size:18px;

#dateTime{ 
    margin:10px 0;
    font-size:16px;
    font-weight:bold;
    color:#555;
}

}

.dark-mode{
    background: #121212;
    color: white;
}

.dark-mode .container{
    background: #1e1e1e;
    color:white;
}

.dark-mode input{
    background: #333;
    color:white;
    border: 1px solid #555;
}

.dark-mode #dateTime{
    color: #ddd;
}

</style>

</head>
<body>

<div class="container">

    <h1>🌤 Weather App</h1>

    <button id=""darkModeBtn"
    onclick=""toggleDarkMode()">
     🌙Dark Mode
    </button>"

    <p id="dateTime"></p>

    <div class="search-box">
        <input
            type="text"
            id="locationInput"
            placeholder="Enter city name"
            onkeypress="if(event.key==='Enter') getWeather()"
        >
        <button onclick="getWeather()">Search</button>
    </div>

    <div class="weather-card" id="weatherCard">

        <h2 id="city"></h2>

        <img id="weatherIcon" src="" alt="">

        <h3 id="condition"></h3>

        <div class="weather-info">
            <p>🌡 Temperature: <span id="temp"></span> °C</p>
            <p>🥵 Feels Like: <span id="feelsLike"></span> °C</p>
            <p>💨 Wind Speed: <span id="wind"></span> km/h</p>
            <p>💧 Humidity: <span id="humidity"></span>%</p>
            <p>🌡 Pressure: <span id="pressure"></span> mb</p>
            <p>🌫 Air Quality (PM2.5): <span id="aqi"></span></p>
            <p>🌄Sunrise: <span id="sunrise"></span></p>
            <p>🌇Sunset: <span id="sunset"></span></p>
        </div>

    </div>

</div>

<script>

function toggleDarkMode() {
    document.body.classList.toggle("dark-mode");
    const btn = document.getElementById("darkModeBtn");

    if(document.body.classList.contains("dark-mode")) {
        btn.innerText = "☀️ Light Mode";
    }
    else{
        btn.innerText = "🌙Dark Mode";
    }

}

function updateDateTime(){
    const now = new Date();

    const date = now.toLocalDateString("en-IN",
{
    day:"numeric",
    month:"long",
    year:"numeric"
    });

    const time =
now.toLocaleTimeString("en-IN");

document.getElementById("dateTime").innerHTML = '📅 ${date}<br>⏲️ ${time}';
}
async function getWeather() {

    const location =
        document.getElementById("locationInput").value.trim();

    if(location === ""){
        alert("Please enter a city name");
        return;
    }

    const apiKey = "YOUR_API_KEY_HERE";

    const url =
    `https://api.weatherapi.com/v1/forecast.json?key=${apiKey}&q=${location}&days=1&aqi=yes`;

    try {

        const response = await fetch(url);

        if(!response.ok){
            throw new Error("Location not found");
        }

        const data = await response.json();

        document.getElementById("weatherCard").style.display = "block";

        document.getElementById("city").innerText =
            `${data.location.name}, ${data.location.country}`;

        document.getElementById("temp").innerText =
            data.current.temp_c;

        document.getElementById("wind").innerText =
            data.current.wind_kph;

        document.getElementById("humidity").innerText =
            data.current.humidity;

        document.getElementById("feelsLike").innerText =
            data.current.feelslike_c;

        document.getElementById("pressure").innerText =
            data.current.pressure_mb;  

        document.getElementById("aqi").innerText =
            Number(data.current.air_quality.pm2_5).toFixed(2);

        document.getElementById("sunrise").innerText =
            data.forecast.forecastday[0].astro.sunrise;

        document.getElementById("sunset").innerText =
            data.forecast.forecastday[0].astro.sunset;

        const condition = data.cuurent.condition.text;

        let emoji = "🌥️";
        if(condition.includes("Sunny")){
            emoji = "☀️"
        }
        else if (condition.includes("Cloud")){
            emoji = "☁️"
        }
         else if (condition.includes("Rain")){
            emoji = "🌧️"
        }
         else if (condition.includes("Thunder")){
            emoji = "⛈️"
        }
         else if (condition.includes("Mist")){
            emoji = "🌫️"
        }
         else if (condition.includes("Snow")){
            emoji = "❄️"
        }

        document.getElementById("condition").innerText =
            emoji + " " + condition;

        document.getElementById("weatherIcon").src =
            "https:" + data.current.condition.icon;

    } catch(error) {

        alert("Location not found!");

        document.getElementById("weatherCard").style.display = "none";

        console.error(error);
    }
}

updateDateTime();
setInterval(updateDateTime, 1000);

</script>

</body>
</html>
